server:
  port: 9095

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/db_presupuesto?createDatabaseIfNotExist=true&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

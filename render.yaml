# Render Blueprint — despliegue de los 11 microservicios de PC Builder.
# Uso: en Render, "New +" -> "Blueprint" -> conectar este repo -> Render detecta este archivo.
#
# Notas importantes (léelas antes de desplegar):
# 1. Render no ofrece MySQL administrado. Este blueprint despliega un mysql:8.0 como
#    "private service" con disco persistente (requiere un plan pago para el disco).
#    Alternativa gratuita: usa un MySQL externo (PlanetScale, Railway, Aiven, etc.) y
#    reemplaza el valor de DB_HOST/DB_USERNAME/DB_PASSWORD de cada servicio.
# 2. Los 10 microservicios de negocio quedan como "private services" (solo accesibles
#    dentro de la red interna de Render, en http://<nombre>:<puerto>) — igual que en
#    docker-compose, donde solo el gateway está expuesto públicamente.
# 3. ms-gateway es el único "web service" (público). Ajusta CORS si conectas un frontend.
# 4. JWT_SECRET debe ser IDÉNTICO en los 11 servicios (ya viene fijado abajo con el mismo
#    valor por defecto que usa el proyecto en local; cámbialo por uno propio en producción
#    editando la variable en el dashboard de Render, en los 11 servicios a la vez).

services:
  - type: pserv
    name: mysql
    runtime: image
    image:
      url: docker.io/library/mysql:8.0
    plan: starter
    disk:
      name: mysql-data
      mountPath: /var/lib/mysql
      sizeGB: 1
    envVars:
      - key: MYSQL_ROOT_PASSWORD
        value: root

  - type: pserv
    name: ms-usuarios
    runtime: docker
    dockerfilePath: ./ms-usuarios/Dockerfile
    dockerContext: ./ms-usuarios
    plan: starter
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: dev
      - key: DB_HOST
        value: mysql
      - key: DB_USERNAME
        value: root
      - key: DB_PASSWORD
        value: root
      - key: JWT_SECRET
        value: pcbuilder-choro-ms-login-clave-secreta-cambiar-en-produccion-2026

  - type: pserv
